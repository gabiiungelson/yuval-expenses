<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>הוצאות יובל</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f4f0;color:#1a1a18;font-size:14px;padding-bottom:90px}

/* Header */
.header{background:#1a1a18;color:#fff;padding:12px 16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.hrow1{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.logo{font-size:22px}
.htitle{font-size:16px;font-weight:700}
.hsub{font-size:11px;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:5px}
.dot{width:7px;height:7px;border-radius:50%;background:#51cf66;display:inline-block;flex-shrink:0}
.dot.off{background:#ff6b6b}
.bcards{display:flex;gap:8px}
.bc{flex:1;background:rgba(255,255,255,.1);border-radius:8px;padding:8px 10px;text-align:center}
.bcv{font-size:17px;font-weight:700;font-family:monospace;line-height:1}
.bcl{font-size:10px;color:rgba(255,255,255,.5);margin-top:2px}
.bc.u .bcv{color:#ff6b6b}
.bc.p .bcv{color:#51cf66}

/* Main */
.main{max-width:600px;margin:0 auto;padding:12px;display:flex;flex-direction:column;gap:10px}

/* Filters */
.filters{background:#fff;border:1px solid #ddd;border-radius:10px;padding:10px 12px;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.fsel,.fdate{border:1px solid #ddd;border-radius:6px;padding:7px 9px;font-size:12px;background:#f5f4f0;color:#1a1a18;font-family:Arial;flex:1;min-width:90px}
.fdate{min-width:115px}
.fclear{background:none;border:1px solid #ddd;border-radius:6px;padding:7px 10px;font-size:12px;cursor:pointer;color:#666;white-space:nowrap;font-family:Arial}

/* Summary */
.summary{background:#fff;border:1px solid #ddd;border-radius:10px;padding:12px}
.slbl{font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.prow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.prow:last-child{border-bottom:none}
.pname{font-weight:600}
.ppaid{font-size:11px;color:#888}
.pbal{font-family:monospace;font-size:14px;font-weight:700}

/* Bulk bar */
.bulkbar{display:none;background:#1a4fa0;color:#fff;border-radius:10px;padding:10px 14px;align-items:center;gap:10px;flex-wrap:wrap}
.bulkbar.on{display:flex}
.bulkinfo{flex:1;font-size:13px}
.btn-bp{background:#51cf66;color:#fff;border:none;border-radius:6px;padding:8px 14px;font-size:13px;cursor:pointer;font-weight:600;font-family:Arial}

/* Section row */
.secrow{display:flex;justify-content:space-between;align-items:center}
.seclbl{font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.08em}
.cbadge{background:#e0e0e0;color:#666;border-radius:20px;padding:2px 8px;font-size:11px;font-weight:600}

/* Expense list */
.elist{display:flex;flex-direction:column;gap:8px}
.ecard{background:#fff;border:1px solid #ddd;border-radius:10px;padding:12px;border-right:3px solid #ddd;transition:border-color .15s}
.ecard.unpaid{border-right-color:#e67700;background:#fffcf8}
.ecard.paid{border-right-color:#1a6b3a}
.ecard.sel{background:#e8eef8;border-color:#1a4fa0}
.ctop{display:flex;align-items:flex-start;gap:10px}
.cchk{width:18px;height:18px;margin-top:3px;flex-shrink:0;cursor:pointer;accent-color:#1a4fa0}
.cmain{flex:1;min-width:0}
.creason{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.cmeta{font-size:11px;color:#888;display:flex;gap:8px;flex-wrap:wrap}
.camount{font-size:18px;font-weight:700;font-family:monospace;white-space:nowrap}
.camount.unpaid{color:#e67700}
.camount.paid{color:#1a6b3a}
.ctags{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.tp{background:#e4f2ea;color:#1a6b3a}
.tu{background:#fff3e0;color:#e67700}
.tr{background:#e8eef8;color:#1a4fa0}
.tnr{background:#f0f0f0;color:#888}
.cbtns{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
.btn-pay{background:#e4f2ea;color:#1a6b3a;border:1px solid #1a6b3a;border-radius:6px;padding:7px 13px;font-size:12px;cursor:pointer;font-weight:600;font-family:Arial}
.btn-pay:active{background:#1a6b3a;color:#fff}
.btn-unpay{background:#f0f0f0;color:#666;border:1px solid #ddd;border-radius:6px;padding:7px 13px;font-size:12px;cursor:pointer;font-family:Arial}
.btn-del{background:#f5e4e4;color:#8b1a1a;border:1px solid #8b1a1a;border-radius:6px;padding:7px 10px;font-size:12px;cursor:pointer;font-family:Arial}
.btn-del:active{background:#8b1a1a;color:#fff}
.btn-edit{background:#f0f0f0;color:#444;border:1px solid #ddd;border-radius:6px;padding:7px 10px;font-size:12px;cursor:pointer;font-family:Arial}
.btn-edit:active{background:#ddd}

/* Empty / Loading */
.empty{text-align:center;padding:40px 20px;color:#aaa}
.empty .ico{font-size:40px;margin-bottom:10px}

/* FAB */
.fab{position:fixed;bottom:20px;left:20px;width:56px;height:56px;background:#1a4fa0;color:#fff;border:none;border-radius:50%;font-size:28px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;z-index:200;line-height:1}
.fab:active{background:#133a78}

/* Modal bottom sheet */
.moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:flex-end;justify-content:center}
.moverlay.on{display:flex}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:20px 16px 36px;width:100%;max-width:600px;max-height:92vh;overflow-y:auto}
.mtitle{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.mclose{background:none;border:none;font-size:24px;cursor:pointer;color:#888;line-height:1;padding:0 4px}
.fg{margin-bottom:13px}
.flbl{font-size:12px;color:#666;margin-bottom:4px;display:block;font-weight:500}
.finput{width:100%;border:1px solid #ddd;border-radius:8px;padding:10px 12px;font-size:15px;background:#f8f8f8;color:#1a1a18;font-family:Arial}
.finput:focus{outline:none;border-color:#1a4fa0;background:#fff}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tgrp{display:flex;gap:6px}
.tbtn{flex:1;border:1px solid #ddd;border-radius:8px;padding:10px;font-size:13px;cursor:pointer;background:#f8f8f8;color:#666;font-family:Arial;font-weight:500}
.tbtn.ry{background:#e4f2ea;border-color:#1a6b3a;color:#1a6b3a}
.tbtn.rn{background:#f5e4e4;border-color:#8b1a1a;color:#8b1a1a}
.tbtn.sp{background:#e4f2ea;border-color:#1a6b3a;color:#1a6b3a}
.tbtn.su{background:#fff3e0;border-color:#e67700;color:#e67700}
.btn-submit{width:100%;background:#1a4fa0;color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;font-family:Arial}
.btn-submit:active{background:#133a78}

/* Confirm dialog */
.cov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;align-items:center;justify-content:center;padding:20px}
.cov.on{display:flex}
.cbox{background:#fff;border-radius:12px;padding:22px;width:100%;max-width:300px;text-align:center}
.ctitle2{font-size:15px;font-weight:700;margin-bottom:8px}
.ctext{font-size:13px;color:#666;margin-bottom:18px;white-space:pre-line}
.cbtns2{display:flex;gap:8px}
.cbtn{flex:1;padding:11px;border-radius:8px;font-size:14px;cursor:pointer;font-family:Arial;font-weight:600;border:none}
.cbtn.cancel{background:#f0f0f0;color:#666}
.cbtn.ok{background:#8b1a1a;color:#fff}

/* Toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}
.toast.tok{background:#1a6b3a}
.toast.terr{background:#8b1a1a}

/* Category row */
.catrow{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.catrow::-webkit-scrollbar{display:none}
.catcard{flex:0 0 auto;border-radius:10px;padding:9px 12px;cursor:pointer;text-align:center;border:2px solid transparent;transition:all .15s;min-width:70px}
.catcard.active{border-color:currentColor;transform:translateY(-1px)}
.catcard .cicon{font-size:20px;line-height:1}
.catcard .cname{font-size:11px;font-weight:600;margin-top:3px}
.catcard .camt{font-size:12px;font-family:monospace;font-weight:700;margin-top:2px}
/* Category tag on card */
.tag-cat{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
/* Category picker in form */
.catpick{display:flex;gap:6px;flex-wrap:wrap}
.catpill{border:1px solid #ddd;border-radius:20px;padding:6px 12px;font-size:12px;cursor:pointer;background:#f8f8f8;color:#666;font-family:Arial;font-weight:500;white-space:nowrap}
.catpill.sel{border-width:2px;font-weight:700}

/* Summary modal */
.sumtable{width:100%;border-collapse:collapse;font-size:14px;margin-top:10px}
.sumtable th{background:#f5f4f0;padding:9px 10px;text-align:right;font-weight:600;border-bottom:2px solid #ddd;font-size:12px}
.sumtable td{padding:9px 10px;border-bottom:1px solid #f0f0f0}
.sumtable tr:last-child td{border-bottom:none;font-weight:700;background:#f5f4f0}
.sum-paid{color:#1a6b3a;font-weight:600;font-family:monospace}
.sum-unpaid{color:#e67700;font-weight:600;font-family:monospace}
.sum-total{font-family:monospace;font-weight:700}
.btn-sum{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;font-family:Arial;font-weight:600}
.btn-sum:active{background:rgba(255,255,255,.25)}
.btn-deleteall{width:100%;background:#f5e4e4;color:#8b1a1a;border:1px solid #8b1a1a;border-radius:8px;padding:10px;font-size:13px;cursor:pointer;font-family:Arial;font-weight:600;margin-top:8px}

/* Import */
.btn-import{background:none;border:1px solid #ddd;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;color:#666;font-family:Arial;font-weight:600}
.btn-import:hover{background:#f0f0f0}
.ipreview{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px}
.ipreview th{background:#f5f4f0;padding:7px 8px;text-align:right;font-weight:600;border-bottom:2px solid #ddd}
.ipreview td{padding:7px 8px;border-bottom:1px solid #f0f0f0;white-space:nowrap}
.ipreview tr:last-child td{border-bottom:none}
.ipaid{color:#1a6b3a;font-weight:600}
.iunpaid{color:#e67700;font-weight:600}
.icount{font-size:13px;color:#666;margin-top:10px;text-align:center}
.btn-doimport{width:100%;background:#1a6b3a;color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px;font-family:Arial}
.btn-doimport:disabled{background:#aaa;cursor:not-allowed}
.ifile{width:100%;border:2px dashed #ddd;border-radius:10px;padding:20px;text-align:center;cursor:pointer;color:#888;font-size:13px;background:#fafafa}
.ifile:hover{border-color:#1a4fa0;color:#1a4fa0}

@media(max-width:380px){.frow{grid-template-columns:1fr}.bcv{font-size:15px}}
</style>
</head>
<body>

<div class="header">
  <div class="hrow1">
    <div class="logo">💰</div>
    <div>
      <div class="htitle">הוצאות יובל</div>
      <div class="hsub">מעקב הוצאות משפחתי <span class="dot" id="dot"></span></div>
      <div style="display:flex;gap:6px">
        <button class="btn-sum" onclick="openSummary()">📊 סיכום</button>
        <button class="btn-sum" style="background:rgba(26,107,58,.35);border-color:rgba(26,107,58,.5)" onclick="exportToExcel()">📤 אקסל</button>
      </div>
    </div>
  </div>
  <div class="bcards">
    <div class="bc u"><div class="bcv" id="hUnpaid">₪0</div><div class="bcl">לתשלום</div></div>
    <div class="bc p"><div class="bcv" id="hPaid">₪0</div><div class="bcl">שולם</div></div>
    <div class="bc"><div class="bcv" id="hTotal">₪0</div><div class="bcl">סה"כ</div></div>
  </div>
</div>

<div class="main">
  <div class="filters">
    <select class="fsel" id="fltPayer" onchange="applyFilter()">
      <option value="">כל המשלמים</option>
    </select>
    <select class="fsel" id="fltStatus" onchange="applyFilter()">
      <option value="">כל הסטטוסים</option>
      <option value="unpaid">לא שולם</option>
      <option value="paid">שולם</option>
    </select>
    <input type="date" class="fdate" id="fltFrom" onchange="applyFilter()" title="מתאריך">
    <input type="date" class="fdate" id="fltTo" onchange="applyFilter()" title="עד תאריך">
    <button class="fclear" onclick="clearFilters()">נקה</button>
  </div>

  <div class="summary" id="summary"></div>

  <!-- Category breakdown row -->
  <div class="catrow" id="catrow"></div>

  <div class="bulkbar" id="bulkbar">
    <div class="bulkinfo" id="bulkinfo"></div>
    <button class="btn-bp" onclick="bulkPay()">✓ סמן כשולם</button>
  </div>

  <div class="secrow">
    <div class="seclbl">הוצאות</div>
    <div style="display:flex;align-items:center;gap:8px">
      <button class="btn-import" onclick="openImport()">📥 ייבוא</button>
      <button class="btn-import" style="color:#8b1a1a;border-color:#8b1a1a" onclick="deleteAllData()">🗑 מחק</button>
      <div class="cbadge" id="badge">0</div>
    </div>
  </div>
  <div class="elist" id="elist">
    <div class="empty"><div class="ico">⏳</div><p>טוען נתונים...</p></div>
  </div>
</div>

<button class="fab" onclick="openModal()">+</button>

<!-- Add Expense Modal -->
<div class="moverlay" id="moverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="mtitle">
      <span id="mtitle-text">הוספת הוצאה</span>
      <button class="mclose" onclick="closeModal()">×</button>
    </div>
    <div class="fg">
      <label class="flbl">תאריך</label>
      <input type="date" class="finput" id="fDate">
    </div>
    <div class="frow">
      <div class="fg">
        <label class="flbl">משלם</label>
        <select class="finput" id="fPayer"></select>
      </div>
      <div class="fg">
        <label class="flbl">סכום (₪)</label>
        <input type="number" class="finput" id="fAmount" placeholder="0" step="0.01" min="0" inputmode="decimal">
      </div>
    </div>
    <div class="fg">
      <label class="flbl">סיבת ההוצאה</label>
      <input type="text" class="finput" id="fReason" placeholder="לדוגמה: תרופות, ביגוד...">
    </div>
    <div class="fg">
      <label class="flbl">קטגוריה</label>
      <div class="catpick" id="catpick"></div>
    </div>
    <div class="frow">
      <div class="fg">
        <label class="flbl">קבלה?</label>
        <div class="tgrp">
          <button class="tbtn" id="tRY" onclick="tog('receipt','yes')">כן</button>
          <button class="tbtn" id="tRN" onclick="tog('receipt','no')">לא</button>
        </div>
      </div>
      <div class="fg">
        <label class="flbl">סטטוס</label>
        <div class="tgrp">
          <button class="tbtn" id="tSP" onclick="tog('status','paid')">שולם</button>
          <button class="tbtn" id="tSU" onclick="tog('status','unpaid')">לא שולם</button>
        </div>
      </div>
    </div>
    <button class="btn-submit" onclick="addExpense()"><span id="btn-submit-text">הוסף הוצאה ✓</span></button>
  </div>
</div>

<!-- Import Modal -->
<div class="moverlay" id="importOverlay" onclick="if(event.target===this)closeImport()">
  <div class="modal">
    <div class="mtitle">
      ייבוא מאקסל
      <button class="mclose" onclick="closeImport()">×</button>
    </div>
    <div id="importStep1">
      <label class="ifile" for="xlsxFile">
        לחץ לבחירת קובץ Excel או CSV<br>
        <span style="font-size:11px;color:#aaa;margin-top:4px;display:block">.xlsx / .xls / .csv</span>
      </label>
      <input type="file" id="xlsxFile" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleFile(this)">
      <button class="btn-deleteall" onclick="deleteAllData()">🗑 מחק את כל הנתונים הקיימים לפני ייבוא</button>
    </div>
    <div id="importStep2" style="display:none">
      <div class="icount" id="importCount"></div>
      <div style="overflow-x:auto">
        <table class="ipreview" id="importTable"></table>
      </div>
      <button class="btn-doimport" id="btnDoImport" onclick="doImport()">ייבא הכל ל-Firebase</button>
    </div>
  </div>
</div>

<!-- Summary Modal -->
<div class="moverlay" id="summaryOverlay" onclick="if(event.target===this)closeSummary()">
  <div class="modal">
    <div class="mtitle">
      📊 סיכום הוצאות
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn-import" style="color:#1a6b3a;border-color:#1a6b3a" onclick="exportToExcel()">📤 ייצוא</button>
        <button class="mclose" onclick="closeSummary()">×</button>
      </div>
    </div>
    <div id="summaryContent"></div>
  </div>
</div>

<!-- Confirm dialog -->
<div class="cov" id="cov">
  <div class="cbox">
    <div class="ctitle2">אישור מחיקה</div>
    <div class="ctext" id="ctext"></div>
    <div class="cbtns2">
      <button class="cbtn cancel" onclick="closeCon()">ביטול</button>
      <button class="cbtn ok" onclick="doCon()">מחק</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ================================================================
// FIREBASE CONFIGURATION
// 1. Go to https://console.firebase.google.com
// 2. Create or open a project → Build → Realtime Database → Create database
// 3. Gear icon → Project Settings → Your apps → Add web app → copy config
// 4. Paste the values below
// ================================================================
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyDLzCv5eQVnhxLGY0E_tOWb9pw6sa7waLg",
  authDomain:        "yuval-expenses.firebaseapp.com",
  databaseURL:       "https://yuval-expenses-default-rtdb.firebaseio.com",
  projectId:         "yuval-expenses",
  storageBucket:     "yuval-expenses.firebasestorage.app",
  messagingSenderId: "585470176973",
  appId:             "1:585470176973:web:016d796e23ef58949f4384"
};
// ================================================================
// REALTIME DATABASE SECURITY RULES
// In Firebase Console → Realtime Database → Rules, paste:
// { "rules": { ".read": true, ".write": true } }
// This allows anyone with the URL to read/write — suitable for
// a private family URL shared among known members.
// ================================================================

// ================================================================
// FAMILY MEMBERS — edit the names in this list
// ================================================================
const PAYERS = ['גבי', 'חגית', 'יובל'];

const CATEGORIES = [
  { id: 'food',    label: 'מזון ואוכל', icon: '🍔', color: '#e67700', bg: '#fff3e0' },
  { id: 'taxi',    label: 'מוניות',     icon: '🚕', color: '#1a4fa0', bg: '#e8eef8' },
  { id: 'medical', label: 'תרופות',     icon: '💊', color: '#1a6b3a', bg: '#e4f2ea' },
  { id: 'clothes', label: 'ביגוד',      icon: '👕', color: '#7b2d8b', bg: '#f3e8f8' },
  { id: 'general', label: 'כללי',       icon: '📦', color: '#555',    bg: '#f0f0f0' },
];
// ================================================================

firebase.initializeApp(FIREBASE_CONFIG);
const db  = firebase.database();
const ref = db.ref('expenses');

let all       = [];
let shown     = [];
let sel       = new Set();
let togs      = { receipt: 'no', status: 'unpaid' };
let conCb     = null;
let editingId = null;
let selCat    = null; // active category filter
let selCatForm = null; // selected category in form

// ── Init ─────────────────────────────────────────────
function init() {
  document.getElementById('fDate').value = today();

  PAYERS.forEach(p => {
    document.getElementById('fPayer').innerHTML   += `<option value="${esc(p)}">${esc(p)}</option>`;
    document.getElementById('fltPayer').innerHTML += `<option value="${esc(p)}">${esc(p)}</option>`;
  });

  tog('receipt', 'no');
  tog('status',  'unpaid');

  // Category picker in form
  document.getElementById('catpick').innerHTML = CATEGORIES.map(c =>
    `<button class="catpill" id="cp_${c.id}" onclick="setFormCat('${c.id}')">${c.icon} ${c.label}</button>`
  ).join('');
  setFormCat('general');

  db.ref('.info/connected').on('value', s => {
    document.getElementById('dot').className = 'dot' + (s.val() ? '' : ' off');
  });

  ref.on('value', snap => {
    const d = snap.val() || {};
    all = Object.entries(d).map(([id, v]) => ({ id, ...v }));
    all.sort((a, b) => {
      const da = a.date ? new Date(a.date).getTime() : 0;
      const db = b.date ? new Date(b.date).getTime() : 0;
      return db - da || b.createdAt - a.createdAt;
    });
    applyFilter();
  });
}

// ── Filters ──────────────────────────────────────────
function applyFilter() {
  const payer  = document.getElementById('fltPayer').value;
  const status = document.getElementById('fltStatus').value;
  const from   = document.getElementById('fltFrom').value;
  const to     = document.getElementById('fltTo').value;

  shown = all.filter(e => {
    if (payer  && e.payer !== payer)                        return false;
    if (status === 'paid'   && !e.isPaid)                   return false;
    if (status === 'unpaid' &&  e.isPaid)                   return false;
    if (from   && e.date < from)                            return false;
    if (to     && e.date > to)                              return false;
    if (selCat && (e.category || 'general') !== selCat)    return false;
    return true;
  });

  sel.clear();
  render();
}

function clearFilters() {
  ['fltPayer','fltStatus','fltFrom','fltTo'].forEach(id => {
    document.getElementById(id).value = '';
  });
  applyFilter();
}

// ── Render ────────────────────────────────────────────
function render() {
  renderHeader();
  renderSummary();
  renderCatRow();
  renderBulkBar();
  renderList();
}

function renderHeader() {
  const total = all.reduce((s, e) => s + (e.amount || 0), 0);
  const paid  = all.filter(e => e.isPaid).reduce((s, e) => s + (e.amount || 0), 0);
  document.getElementById('hTotal').textContent  = fmt(total);
  document.getElementById('hPaid').textContent   = fmt(paid);
  document.getElementById('hUnpaid').textContent = fmt(total - paid);
}

function renderSummary() {
  const m = {};
  PAYERS.forEach(p => m[p] = { total: 0, paid: 0 });
  all.forEach(e => {
    if (!m[e.payer]) m[e.payer] = { total: 0, paid: 0 };
    m[e.payer].total += (e.amount || 0);
    if (e.isPaid) m[e.payer].paid += (e.amount || 0);
  });

  const rows = Object.entries(m)
    .filter(([, v]) => v.total > 0)
    .map(([name, v]) => {
      const rem = v.total - v.paid;
      return `<div class="prow">
        <span class="pname">${esc(name)}</span>
        <span class="ppaid">שולם ${fmt(v.paid)}</span>
        <span class="pbal" style="color:${rem > 0 ? '#e67700' : '#1a6b3a'}">${fmt(rem)}</span>
      </div>`;
    }).join('');

  document.getElementById('summary').innerHTML = rows
    ? `<div class="slbl">פירוט לפי משלם</div>${rows}`
    : `<div style="text-align:center;color:#aaa;padding:8px;font-size:13px">אין נתונים עדיין</div>`;
}

function renderCatRow() {
  document.getElementById('catrow').innerHTML = CATEGORIES.map(c => {
    const total = all.filter(e => (e.category || 'general') === c.id)
                     .reduce((s, e) => s + (e.amount || 0), 0);
    const active = selCat === c.id;
    return `<div class="catcard${active ? ' active' : ''}"
      style="background:${c.bg};color:${c.color}"
      onclick="filterByCat('${c.id}')">
      <div class="cicon">${c.icon}</div>
      <div class="cname">${c.label}</div>
      <div class="camt">${fmt(total)}</div>
    </div>`;
  }).join('');
}

function filterByCat(id) {
  selCat = selCat === id ? null : id;
  applyFilter();
}

function renderBulkBar() {
  const unpaidSel = [...sel].filter(id => {
    const e = all.find(x => x.id === id);
    return e && !e.isPaid;
  });
  const bar = document.getElementById('bulkbar');
  if (sel.size && unpaidSel.length) {
    bar.classList.add('on');
    document.getElementById('bulkinfo').textContent =
      `${sel.size} נבחרו · ${unpaidSel.length} ממתינים לתשלום`;
  } else {
    bar.classList.remove('on');
  }
}

function renderList() {
  const el = document.getElementById('elist');
  document.getElementById('badge').textContent = shown.length;

  if (!shown.length) {
    el.innerHTML = `<div class="empty">
      <div class="ico">${all.length ? '🔍' : '📭'}</div>
      <p>${all.length ? 'לא נמצאו הוצאות עם הפילטר הנוכחי' : 'אין הוצאות — לחץ + להוסיף'}</p>
    </div>`;
    return;
  }

  el.innerHTML = shown.map(e => `
    <div class="ecard ${e.isPaid ? 'paid' : 'unpaid'}${sel.has(e.id) ? ' sel' : ''}" data-eid="${e.id}">
      <div class="ctop">
        <input type="checkbox" class="cchk" ${sel.has(e.id) ? 'checked' : ''}
          onchange="selToggle('${e.id}', this.checked)">
        <div class="cmain">
          <div class="creason">${esc(e.reason)}</div>
          <div class="cmeta">
            <span>📅 ${fmtDate(e.date)}</span>
            <span>👤 ${esc(e.payer)}</span>
          </div>
        </div>
        <div class="camount ${e.isPaid ? 'paid' : 'unpaid'}">${fmt(e.amount)}</div>
      </div>
      <div class="ctags">
        <span class="tag ${e.isPaid ? 'tp' : 'tu'}">${e.isPaid ? '✓ שולם' : '⏳ לא שולם'}</span>
        <span class="tag ${e.hasReceipt ? 'tr' : 'tnr'}">${e.hasReceipt ? '🧾 קבלה' : 'ללא קבלה'}</span>
        ${(() => { const c = CATEGORIES.find(x => x.id === (e.category||'general')); return c ? `<span class="tag-cat" style="background:${c.bg};color:${c.color}">${c.icon} ${c.label}</span>` : ''; })()}
      </div>
      <div class="cbtns">
        ${!e.isPaid
          ? `<button class="btn-pay"   onclick="setPaid('${e.id}', true)">✓ סמן כשולם</button>`
          : `<button class="btn-unpay" onclick="setPaid('${e.id}', false)">↩ בטל תשלום</button>`}
        <button class="btn-edit" onclick="editExpense('${e.id}')">✏️</button>
        <button class="btn-del" onclick="delExpense('${e.id}')">🗑</button>
      </div>
    </div>
  `).join('');
}

// ── Actions ───────────────────────────────────────────
function selToggle(id, checked) {
  checked ? sel.add(id) : sel.delete(id);
  const card = document.querySelector(`[data-eid="${id}"]`);
  if (card) card.classList.toggle('sel', checked);
  renderBulkBar();
}

function setPaid(id, isPaid) {
  ref.child(id).update({ isPaid }).catch(() => toast('שגיאה בעדכון', 'terr'));
  toast(isPaid ? 'סומן כשולם ✓' : 'בוטל תשלום', 'tok');
}

function bulkPay() {
  const ids = [...sel].filter(id => {
    const e = all.find(x => x.id === id);
    return e && !e.isPaid;
  });
  const upd = {};
  ids.forEach(id => upd[`${id}/isPaid`] = true);
  ref.update(upd)
    .then(() => { sel.clear(); toast(`${ids.length} סומנו כשולמו ✓`, 'tok'); })
    .catch(() => toast('שגיאה', 'terr'));
}

function delExpense(id) {
  const e = all.find(x => x.id === id);
  if (!e) return;
  openCon(`למחוק את "${e.reason}"?\nפעולה זו אינה ניתנת לביטול.`, () => {
    ref.child(id).remove()
      .then(() => toast('ההוצאה נמחקה', 'tok'))
      .catch(() => toast('שגיאה במחיקה', 'terr'));
  });
}

function addExpense() {
  const date   = document.getElementById('fDate').value;
  const payer  = document.getElementById('fPayer').value;
  const reason = document.getElementById('fReason').value.trim();
  const amount = parseFloat(document.getElementById('fAmount').value);

  if (!date)               { toast('בחר תאריך', 'terr');       return; }
  if (!reason)             { toast('הכנס סיבת הוצאה', 'terr'); return; }
  if (!amount || amount <= 0) { toast('הכנס סכום תקין', 'terr');  return; }

  const data = {
    date, payer, reason, amount,
    hasReceipt: togs.receipt === 'yes',
    isPaid:     togs.status  === 'paid',
    category:   selCatForm || 'general'
  };

  if (editingId) {
    ref.child(editingId).update(data)
      .then(() => { toast('ההוצאה עודכנה ✓', 'tok'); closeModal(); })
      .catch(() => toast('שגיאה בעדכון', 'terr'));
  } else {
    ref.push({ ...data, createdAt: Date.now() })
      .then(() => { toast('ההוצאה נוספה ✓', 'tok'); closeModal(); resetForm(); })
      .catch(() => toast('שגיאה בשמירה', 'terr'));
  }
}

// ── Modal ─────────────────────────────────────────────
function openModal() {
  editingId = null;
  document.getElementById('mtitle-text').textContent = 'הוספת הוצאה';
  document.getElementById('btn-submit-text').textContent = 'הוסף הוצאה ✓';
  document.getElementById('fDate').value = today();
  resetForm();
  document.getElementById('moverlay').classList.add('on');
  setTimeout(() => document.getElementById('fReason').focus(), 300);
}
function editExpense(id) {
  const e = all.find(x => x.id === id);
  if (!e) return;
  editingId = id;
  document.getElementById('mtitle-text').textContent = 'עריכת הוצאה';
  document.getElementById('btn-submit-text').textContent = 'שמור שינויים ✓';
  document.getElementById('fDate').value   = e.date || today();
  document.getElementById('fReason').value = e.reason || '';
  document.getElementById('fAmount').value = e.amount || '';
  const payerEl = document.getElementById('fPayer');
  if ([...payerEl.options].some(o => o.value === e.payer)) payerEl.value = e.payer;
  tog('receipt', e.hasReceipt ? 'yes' : 'no');
  tog('status',  e.isPaid     ? 'paid' : 'unpaid');
  setFormCat(e.category || 'general');
  document.getElementById('moverlay').classList.add('on');
}

function setFormCat(id) {
  selCatForm = id;
  CATEGORIES.forEach(c => {
    const el = document.getElementById('cp_' + c.id);
    if (!el) return;
    if (c.id === id) {
      el.className = 'catpill sel';
      el.style.background = c.bg;
      el.style.borderColor = c.color;
      el.style.color = c.color;
    } else {
      el.className = 'catpill';
      el.style.background = '';
      el.style.borderColor = '';
      el.style.color = '';
    }
  });
}
function closeModal() {
  document.getElementById('moverlay').classList.remove('on');
  editingId = null;
}
function resetForm() {
  document.getElementById('fReason').value = '';
  document.getElementById('fAmount').value = '';
  tog('receipt', 'no');
  tog('status',  'unpaid');
  setFormCat('general');
}

function tog(type, val) {
  togs[type] = val;
  if (type === 'receipt') {
    document.getElementById('tRY').className = 'tbtn' + (val === 'yes' ? ' ry' : '');
    document.getElementById('tRN').className = 'tbtn' + (val === 'no'  ? ' rn' : '');

    document.getElementById('tSP').className = 'tbtn' + (val === 'paid'   ? ' sp' : '');

// ── Import from Excel ────────────────────────────────
let importRows = [];

function openImport() {
  importRows = [];
  document.getElementById('importStep1').style.display = '';
  document.getElementById('importStep2').style.display = 'none';
  document.getElementById('xlsxFile').value = '';
  document.getElementById('importOverlay').classList.add('on');
}
function closeImport() {
  document.getElementById('importOverlay').classList.remove('on');
}

function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      // Get as arrays (header:1) so we work by column position, not name
      const all = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      if (all.length < 2) { toast('הקובץ ריק', 'terr'); return; }

      // Detect if first row is headers (contains text) and skip it
      const firstRow = all[0];
      const hasHeader = firstRow.some(c => typeof c === 'string' && isNaN(c) && c.trim() !== '');
      const dataRows = hasHeader ? all.slice(1) : all;

      // Show column mapping UI
      showColMapper(firstRow, dataRows);
    } catch(err) {
      toast('שגיאה בקריאת הקובץ', 'terr');
    }
  };
  reader.readAsArrayBuffer(file);
}

let rawDataRows = [];
let colMap = { date:0, reason:1, payer:2, amount:3, receipt:4, paid:5, paidDate:6 };

function showColMapper(headers, dataRows) {
  rawDataRows = dataRows;
  // Build options from header row
  const opts = headers.map((h,i) => `<option value="${i}">${h || 'עמודה '+(i+1)}</option>`).join('');
  const fields = [
    ['date','תאריך',0], ['reason','מהות הוצאה',1], ['payer','שולם על ידי',2],
    ['amount','סכום',3], ['receipt','חשבונית (כן/לא)',4], ['paid','הוחזר (כן/לא)',5],
    ['paidDate','תאריך החזר',6]
  ];

  document.getElementById('importStep1').innerHTML = `
    <div style="font-size:13px;color:#666;margin-bottom:12px">
      נמצאו <strong>${dataRows.length}</strong> שורות. בחר איזו עמודה מתאימה לכל שדה:
    </div>
    ${fields.map(([key, label, def]) => `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <label style="flex:1;font-size:13px;font-weight:500">${label}</label>
        <select id="cm_${key}" style="border:1px solid #ddd;border-radius:6px;padding:6px 8px;font-size:12px;background:#f5f4f0;font-family:Arial">
          <option value="-1">— לא רלוונטי —</option>
          ${opts}
        </select>
      </div>
    `).join('')}
    <button onclick="applyColMap()" style="width:100%;background:#1a4fa0;color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;font-family:Arial">
      המשך לתצוגה מקדימה ←
    </button>
  `;

  // Set default selections based on position
  fields.forEach(([key,, def]) => {
    const el = document.getElementById('cm_'+key);
    if (el && def < headers.length) el.value = def;
  });
}

function applyColMap() {
  ['date','reason','payer','amount','receipt','paid','paidDate'].forEach(k => {
    const el = document.getElementById('cm_'+k);
    colMap[k] = el ? parseInt(el.value) : -1;
  });
  importRows = rawDataRows.map(parseRowByPos).filter(Boolean);
  if (!importRows.length) { toast('לא נמצאו שורות תקינות', 'terr'); return; }
  showPreview();
}

function parseRowByPos(row) {
  const get = i => (i >= 0 && i < row.length) ? row[i] : '';
  const rawDate  = get(colMap.date);
  const reason   = String(get(colMap.reason) || '').trim();
  const payer    = String(get(colMap.payer)  || '').trim();
  const rawAmt   = get(colMap.amount);
  const rawRecpt = get(colMap.receipt);
  const rawPaid  = get(colMap.paid);
  const rawPaidDate = get(colMap.paidDate);

  if (!reason && !rawAmt) return null;

  return {
    date:       parseDate(rawDate),
    reason:     reason || 'ללא פירוט',
    payer:      payer  || 'לא צוין',
    amount:     parseAmount(rawAmt),
    hasReceipt: parseBool(rawRecpt),
    isPaid:     parseBool(rawPaid),
    paidDate:   rawPaidDate ? parseDate(rawPaidDate) : '',
    createdAt:  Date.now()
  };
}

function parseDate(v) {
  if (!v) return today();
  if (v instanceof Date) {
    const y = v.getFullYear(), m = String(v.getMonth()+1).padStart(2,'0'), d = String(v.getDate()).padStart(2,'0');
    return `${y}-${m}-${d}`;
  }
  const s = String(v).trim();
  // DD/MM/YYYY or D/M/YYYY
  const m1 = s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})$/);
  if (m1) {
    const [, d, mo, y] = m1;
    const year = y.length === 2 ? '20' + y : y;
    return `${year}-${mo.padStart(2,'0')}-${d.padStart(2,'0')}`;
  }
  // YYYY-MM-DD
  const m2 = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (m2) return s;
  return today();
}

function parseAmount(v) {
  if (typeof v === 'number') return v;
  return parseFloat(String(v).replace(/[₪,\s]/g, '')) || 0;
}

function parseBool(v) {
  if (typeof v === 'boolean') return v;
  if (typeof v === 'number') return v === 1;
  const s = String(v).trim().toLowerCase();
  return s === 'כן' || s === 'yes' || s === '1' || s === 'true';
}

function showPreview() {
  document.getElementById('importStep1').style.display = 'none';
  document.getElementById('importStep2').style.display = '';
  document.getElementById('importCount').textContent = `נמצאו ${importRows.length} שורות לייבוא`;

  const preview = importRows.slice(0, 5);
  document.getElementById('importTable').innerHTML = `
    <thead><tr>
      <th>תאריך</th><th>מהות</th><th>משלם</th><th>סכום</th><th>חשבונית</th><th>הוחזר</th>
    </tr></thead>
    <tbody>
      ${preview.map(r => `<tr>
        <td>${fmtDate(r.date)}</td>
        <td>${esc(r.reason)}</td>
        <td>${esc(r.payer)}</td>
        <td>${fmt(r.amount)}</td>
        <td>${r.hasReceipt ? '✓' : '—'}</td>
        <td class="${r.isPaid ? 'ipaid' : 'iunpaid'}">${r.isPaid ? 'כן' : 'לא'}</td>
      </tr>`).join('')}
    </tbody>
    ${importRows.length > 5 ? `<tfoot><tr><td colspan="6" style="text-align:center;color:#aaa;padding:6px">...ועוד ${importRows.length - 5} שורות</td></tr></tfoot>` : ''}
  `;
}

async function doImport() {
  if (!importRows.length) return;
  const btn = document.getElementById('btnDoImport');
  btn.disabled = true;
  btn.textContent = 'מייבא...';

  try {
    // Push in batches to avoid timeout
    for (const row of importRows) {
      await ref.push(row);
    }
    toast(`יובאו ${importRows.length} הוצאות ✓`, 'tok');
    closeImport();
  } catch(err) {
    toast('שגיאה בייבוא', 'terr');
  } finally {
    btn.disabled = false;
    btn.textContent = 'ייבא הכל ל-Firebase';
  }
}

// ── Export to Excel ───────────────────────────────────
function exportToExcel() {
  const data = shown.length ? shown : all;
  const wb   = XLSX.utils.book_new();

  // Sheet 1 — all expenses
  const expRows = [
    ['תאריך', 'מהות הוצאה', 'משלם', 'קטגוריה', 'סכום (₪)', 'קבלה', 'שולם'],
    ...data.map(e => {
      const cat = CATEGORIES.find(c => c.id === (e.category || 'general'));
      return [
        fmtDate(e.date),
        e.reason,
        e.payer,
        cat ? cat.label : 'כללי',
        e.amount || 0,
        e.hasReceipt ? 'כן' : 'לא',
        e.isPaid    ? 'כן' : 'לא',
      ];
    })
  ];
  const ws1 = XLSX.utils.aoa_to_sheet(expRows);
  ws1['!rightToLeft'] = true;
  ws1['!cols'] = [
    { wch: 12 }, { wch: 28 }, { wch: 10 },
    { wch: 14 }, { wch: 10 }, { wch: 8 }, { wch: 8 },
  ];
  XLSX.utils.book_append_sheet(wb, ws1, 'הוצאות');

  // Sheet 2 — summary by payer
  const m = {};
  PAYERS.forEach(p => m[p] = { paid: 0, unpaid: 0 });
  data.forEach(e => {
    if (!m[e.payer]) m[e.payer] = { paid: 0, unpaid: 0 };
    if (e.isPaid) m[e.payer].paid   += (e.amount || 0);
    else          m[e.payer].unpaid += (e.amount || 0);
  });
  const sumRows = [
    ['משלם', 'שולם (₪)', 'לא שולם (₪)', 'סה"כ (₪)'],
    ...Object.entries(m)
      .filter(([, v]) => v.paid + v.unpaid > 0)
      .map(([name, v]) => [name, v.paid, v.unpaid, v.paid + v.unpaid]),
    ['סה"כ',
      Object.values(m).reduce((s, v) => s + v.paid,   0),
      Object.values(m).reduce((s, v) => s + v.unpaid, 0),
      Object.values(m).reduce((s, v) => s + v.paid + v.unpaid, 0),
    ],
  ];
  const ws2 = XLSX.utils.aoa_to_sheet(sumRows);
  ws2['!rightToLeft'] = true;
  ws2['!cols'] = [{ wch: 12 }, { wch: 12 }, { wch: 14 }, { wch: 12 }];
  XLSX.utils.book_append_sheet(wb, ws2, 'סיכום');

  const dateStr = new Date().toISOString().split('T')[0];
  XLSX.writeFile(wb, `הוצאות_יובל_${dateStr}.xlsx`);
  toast(`יוצא ${data.length} הוצאות ✓`, 'tok');
}

// ── Helpers ───────────────────────────────────────────
function fmt(n) {
  return '₪' + (+(n || 0)).toLocaleString('he-IL', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
}
function fmtDate(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y}`;
}
function today() {
  return new Date().toISOString().split('T')[0];
}
function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c =>
    ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c])
  );
}

init();
</script>
